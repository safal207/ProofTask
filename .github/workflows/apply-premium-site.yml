name: Apply premium ProofTask redesign

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-premium-site.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-redesign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore premium landing page
        shell: bash
        run: |
          cat <<'PAYLOAD' | base64 --decode | gzip --decompress > site/index.html
          
          PAYLOAD
          test -s site/index.html
          grep -q "Trust AI output" site/index.html

      - name: Commit premium redesign
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/index.html
          if git diff --cached --quiet; then
            echo "Premium site is already applied."
            exit 0
          fi
          git commit -m "feat(site): launch premium ProofTask redesign"
          git push
