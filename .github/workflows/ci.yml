name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run unit tests
        run: pytest -q

      - name: Create task through installed CLI
        run: |
          mkdir -p .tmp
          prooftask create-task \
            --task-id task_ci_generated_001 \
            --type manual_qa_check \
            --created-by agent_ci_001 \
            --objective "Verify generated task flow in CI" \
            --acceptance "Open signup page" \
            --acceptance "Submit valid test data" \
            --proof "screenshot" \
            --proof "short written report" \
            --payment-amount 5 \
            --trace-reason "CI generated an agent-facing QA task." \
            --trace-source ci \
            --out .tmp/generated_task.json

          prooftask validate-task .tmp/generated_task.json

      - name: Validate examples through installed CLI
        run: |
          prooftask validate-task examples/manual_qa_task.json
          prooftask validate-proof examples/manual_qa_proof.json

      - name: Run proof trace flow through installed CLI
        run: |
          prooftask submit-proof \
            --task examples/manual_qa_task.json \
            --proof examples/manual_qa_proof.json \
            --out .tmp/submitted_trace.json

          prooftask validate-trace .tmp/submitted_trace.json

          prooftask verify \
            --trace .tmp/submitted_trace.json \
            --decision verified \
            --verifier ci_verifier \
            --reason "CI smoke test passed." \
            --out .tmp/verified_trace.json

          prooftask validate-trace .tmp/verified_trace.json

      - name: Inspect final trace
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          trace = json.loads(Path('.tmp/verified_trace.json').read_text())
          assert trace['status'] == 'verified'
          assert trace['task']['status'] == 'verified'
          assert trace['proof']['result'] == 'pass'
          assert trace['verification']['decision'] == 'verified'
          assert len(trace['events']) >= 3
          print('OK final trace:', trace['trace_id'])
          PY

      - name: Validate negative fixtures
        run: |
          set +e

          prooftask submit-proof \
            --task examples/manual_qa_task.json \
            --proof examples/invalid_mismatched_proof.json \
            --out .tmp/should_not_exist.json
          mismatch_status=$?
          if [ "$mismatch_status" -eq 0 ]; then
            echo "Expected mismatched proof fixture to fail"
            exit 1
          fi

          prooftask validate-trace examples/invalid_final_trace.json
          invalid_trace_status=$?
          if [ "$invalid_trace_status" -eq 0 ]; then
            echo "Expected invalid final trace fixture to fail"
            exit 1
          fi

          prooftask create-task \
            --type manual_qa_check \
            --created-by agent_ci_001 \
            --objective "Invalid payment task" \
            --acceptance "Do something" \
            --proof "screenshot" \
            --payment-amount -1 \
            --out .tmp/invalid_task.json
          invalid_payment_status=$?
          if [ "$invalid_payment_status" -eq 0 ]; then
            echo "Expected negative payment task creation to fail"
            exit 1
          fi

          echo "OK negative fixtures failed as expected"
